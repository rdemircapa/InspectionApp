{% extends 'base.html' %}
{% block title %}Edit User{% endblock %}

{% block content %}
<div class="container py-4">
  <h2 class="mb-4">Edit User</h2>

  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Badge Number (cannot change)</label>
      <input type="text" class="form-control" value="{{ user['badge_number'] }}" disabled>
    </div>
    <div class="mb-3">
      <label for="full_name" class="form-label">Full Name</label>
      <input type="text" class="form-control" name="full_name" id="full_name" value="{{ user['full_name'] }}" required>
    </div>
    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="{{ url_for('add_user') }}" class="btn btn-secondary ms-2">Cancel</a>
  </form>
</div>
{% endblock %}

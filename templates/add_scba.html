{% extends 'base.html' %}
{% block title %}Add SCBA Unit{% endblock %}

{% block content %}
<div class="container py-4">
  <h2 class="mb-4">Add SCBA Unit</h2>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST">
    <div class="row mb-3">
    <div class="col-md-6">
      <label class="form-label">Tag Number (e.g. SCBA-0123)</label>
      <input type="text" name="tag_number" class="form-control" value="{{ request.args.get('tag_number', '') }}" required>


    </div>
    <div class="col-md-6">
      <label class="form-label">Brand</label>
      <input type="text" name="brand" class="form-control" required>
    </div>
  </div>

    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label">Model</label>
        <input type="text" name="model" class="form-control" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Cylinder Capacity (e.g. 6.8L)</label>
        <input type="text" name="cylinder_capacity" class="form-control" required>
      </div>
    </div>

    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label">Cylinder Pressure (e.g. 300 Bar)</label>
        <input type="text" name="cylinder_pressure" class="form-control" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Refiling Date</label>
        <input type="date" name="refiling_date" class="form-control">
      </div>
    </div>

    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label">Hydro Test Date</label>
        <input type="date" name="hydro_test_date" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Cylinder Serial Number</label>
        <input type="text" name="cylinder_serial" class="form-control" required>
      </div>
    </div>

    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label">Regulator Serial Number</label>
        <input type="text" name="regulator_serial" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Location</label>
        <input type="text" name="location" class="form-control" required>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Remarks</label>
      <textarea name="remarks" class="form-control" rows="2"></textarea>
    </div>

    <button type="submit" class="btn btn-primary">Save SCBA</button>
  </form>
</div>
{% endblock %}

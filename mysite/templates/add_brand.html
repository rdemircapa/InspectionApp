{% extends 'base.html' %}

{% block title %}Add Brand{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2>Add New Brand</h2>
  <form method="POST">
    <div class="mb-3">
      <label>Brand Name</label>
      <input type="text" name="name" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-success">Save Brand</button>
    <a href="/add-product" class="btn btn-secondary">Back to Product Entry</a>
  </form>

  <hr>
  <h4 class="mt-4">Existing Brands</h4>
  <table class="table table-bordered mt-3">
    <thead>
      <tr>
        <th>ID</th>
        <th>Brand Name</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for brand in brands %}
      <tr>
        <td>{{ brand.id }}</td>
        <td>{{ brand.name }}</td>
        <td>
          <a href="/edit-brand/{{ brand.id }}" class="btn btn-sm btn-warning">Edit</a>
          <form action="/delete-brand/{{ brand.id }}" method="POST" style="display:inline-block;">
            <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this brand?');">Delete</button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="3" class="text-center">No brands found.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}

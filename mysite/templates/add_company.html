{% extends 'base.html' %}

{% block title %}Add Company{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2>Add New Company</h2>
  <form method="POST">
    <div class="input-group mb-3">
      <input type="text" class="form-control" name="company_name" placeholder="Enter company name" required>
      <button class="btn btn-primary" type="submit">Add Company</button>
    </div>
  </form>

  <h3 class="mt-5">Existing Companies</h3>
  <table class="table table-bordered mt-4">
    <thead class="table-light">
      <tr>
        <th>Company Name</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for company in companies %}
      <tr>
        <td>{{ company['company_name'] }}</td>
        <td>
          <form action="{{ url_for('delete_company', company_id=company['id']) }}" method="POST" onsubmit="return confirm('Are you sure you want to delete this company?');">
            <button type="submit" class="btn btn-sm btn-danger">
              <i class="bi bi-trash"></i> Delete
            </button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}

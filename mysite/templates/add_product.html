<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
{% extends 'base.html' %}

{% block title %}Add Brand{% endblock %}

{% block content %}
<body>

<div class="container mt-4">
    <h2>Add New Product</h2>
    <form method="POST">
        <div class="mb-3">
            <label>Brand</label>
            <select name="brand_id" class="form-select" required>
                {% for brand in brands %}
                <option value="{{ brand.id }}">{{ brand.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label>Serial ID</label>
            <input type="text" name="serial_id" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Product Name</label>
            <input type="text" name="product_name" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="product_type" class="form-label">Product Type</label>
            <select name="product_type" class="form-select" required>
              <option value="">-- Select Type --</option>
              {% for type in product_types %}
              <option value="{{ type.name }}">{{ type.name }}</option>
              {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label>Quantity</label>
            <input type="number" name="product_quantity" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Details</label>
            <textarea name="product_details" class="form-control"></textarea>
        </div>
        <div class="mb-3">
            <label>First Inspection Date</label>
            <input type="date" name="first_inspection_date" class="form-control">
        </div>
        <div class="mb-3">
            <label>Next Inspection Date</label>
            <input type="date" name="next_inspection_date" class="form-control">
        </div>
        <div class="mb-3">
            <label>Service Status</label>
            <input type="text" name="service_status" class="form-control">
        </div>
        <div class="mb-3">
            <label>Remarks</label>
            <textarea name="remarks" class="form-control"></textarea>
        </div>
        <button type="submit" class="btn btn-success">Save Product</button>
        <a href="/" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
</body>
</html>

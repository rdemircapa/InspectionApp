<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scan Fire Extinguisher QR | Inspection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
    }
    .scanner-box {
      background: #ffffff;
      border-radius: 12px;
      padding: 2rem;
      max-width: 450px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    #reader {
      width: 100%;
      max-width: 350px;
      margin: 1rem auto;
    }
    .scan-title {
      color: #dc3545;
    }
    .status-msg {
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="scanner-box text-center">
      <h4 class="scan-title mb-2">🧯 Fire Extinguisher QR Scan</h4>
      <p class="text-muted mb-4">Align the QR tag in the frame below to view inspection info.</p>
      <div id="reader"></div>
      <p id="result" class="status-msg mt-3 text-danger"></p>
      <a href="/" class="btn btn-sm btn-outline-secondary mt-3">← Back to Home</a>
    </div>
  </div>

  <script>
  const resultEl = document.getElementById("result");
  const html5QrCode = new Html5Qrcode("reader");

  function onScanSuccess(decodedText) {
    resultEl.innerText = "✅ Scanned: " + decodedText + "\nRedirecting...";

    // 🔁 QR tarayıcıyı durdur
    html5QrCode.stop().then(() => {
      // ⏳ 300ms sonra yönlendirme
      setTimeout(() => {
        window.location.href = "/inspect-tag/" + decodedText;
      }, 300);
    }).catch(err => {
      resultEl.innerText = "⚠️ Failed to stop camera: " + err;
    });
  }

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSuccess
  ).catch(err => {
    resultEl.innerText = "🚫 Camera access error: " + err;
  });
</script>




</body>
</html>

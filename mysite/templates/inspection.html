{% extends 'base.html' %}

{% block title %}Inspection Form{% endblock %}

{% block content %}

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<div class="container">
  <h2 class="mb-4">Equipment Inspection Form</h2>

  <form method="POST">
    <div class="card mb-4 shadow-sm">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0">Visual Inspection</h5>
      </div>
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label">
            Surface Condition
            <i class="bi bi-info-circle" data-bs-toggle="tooltip" data-bs-placement="right" title="Check for cracks, corrosion, deformation, or physical damage."></i>
          </label>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="surface_condition" value="Pass" required>
            <label class="form-check-label">Pass</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="surface_condition" value="Fail" required>
            <label class="form-check-label">Fail</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="surface_condition" value="N/A" required>
            <label class="form-check-label">N/A</label>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">
            Labels/Markings Legibility
            <i class="bi bi-info-circle" data-bs-toggle="tooltip" data-bs-placement="right" title="Ensure labels and markings are readable and intact."></i>
          </label>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="labels_legibility" value="Pass" required>
            <label class="form-check-label">Pass</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="labels_legibility" value="Fail" required>
            <label class="form-check-label">Fail</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="labels_legibility" value="N/A" required>
            <label class="form-check-label">N/A</label>
          </div>
        </div>
      </div>
    </div>

    <div class="card mb-4 shadow-sm">
      <div class="card-header bg-success text-white">
        <h5 class="mb-0">Functional Check</h5>
      </div>
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label">
            Locking Mechanism
            <i class="bi bi-info-circle" data-bs-toggle="tooltip" data-bs-placement="right" title="Check if all locking parts engage and release properly."></i>
          </label>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="locking_mechanism" value="Pass" required>
            <label class="form-check-label">Pass</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="locking_mechanism" value="Fail" required>
            <label class="form-check-label">Fail</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="locking_mechanism" value="N/A" required>
            <label class="form-check-label">N/A</label>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">
            Moving Parts Operation
            <i class="bi bi-info-circle" data-bs-toggle="tooltip" data-bs-placement="right" title="Check if moving parts operate smoothly without resistance."></i>
          </label>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="moving_parts" value="Pass" required>
            <label class="form-check-label">Pass</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="moving_parts" value="Fail" required>
            <label class="form-check-label">Fail</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="moving_parts" value="N/A" required>
            <label class="form-check-label">N/A</label>
          </div>
        </div>
      </div>
    </div>

    <div class="card mb-4 shadow-sm">
      <div class="card-header bg-info text-white">
        <h5 class="mb-0">Additional Information</h5>
      </div>
      <div class="card-body">
        <div class="mb-3">
          <label for="remarks" class="form-label">Remarks / Notes</label>
          <textarea class="form-control" id="remarks" name="remarks" rows="4"></textarea>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="inspector_name" class="form-label">Inspector Name (Optional)</label>
            <input type="text" class="form-control" id="inspector_name" name="inspector_name">
          </div>
          <div class="col-md-6 mb-3">
            <label for="badge_number" class="form-label">Badge Number (Optional)</label>
            <input type="text" class="form-control" id="badge_number" name="badge_number">
          </div>
        </div>

        <div class="mb-3">
          <label for="inspection_datetime" class="form-label">Inspection Date & Time</label>
          <input type="text" class="form-control" id="inspection_datetime" name="inspection_datetime" readonly>
        </div>
      </div>
    </div>

    <div class="d-grid">
      <button type="submit" class="btn btn-primary btn-lg">Submit Inspection</button>
    </div>
  </form>
</div>

<script>
// Initialize tooltips
var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
tooltipTriggerList.forEach(function (tooltipTriggerEl) {
  new bootstrap.Tooltip(tooltipTriggerEl)
})

// Set current date and time automatically
document.getElementById('inspection_datetime').value = new Date().toLocaleString();
</script>
{% endblock %}
